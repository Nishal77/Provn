version: '3.9'

# ATTESTA local development infrastructure.
# Provides PostgreSQL 16, Redis 7, Neo4j, and Elasticsearch.
# The apps themselves run via pnpm dev (hot-reload), not in Docker.
#
# Usage:
#   docker compose up -d          Start all services
#   docker compose down           Stop and remove containers
#   docker compose down -v        Also remove volumes (DESTROYS DATA)
#
# Minimal startup (no graph/search):
#   docker compose up -d postgres redis

services:
  postgres:
    image: postgres:16-alpine
    container_name: attesta-postgres
    restart: unless-stopped
    ports:
      - '5433:5432' # Use 5433 to avoid conflict with local PostgreSQL on 5432
    environment:
      POSTGRES_USER: attesta
      POSTGRES_PASSWORD: attesta_dev
      POSTGRES_DB: attesta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U attesta -d attesta']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attesta-redis
    restart: unless-stopped
    ports:
      - '6380:6379' # Use 6380 to avoid conflict with local Redis on 6379
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: attesta-neo4j
    restart: unless-stopped
    ports:
      - '7474:7474'  # Browser UI
      - '7687:7687'  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/attesta_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:7474']
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: attesta-elasticsearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms256m -Xmx512m'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "green\|yellow"']
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  es_data:
    driver: local
